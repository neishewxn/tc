project_name: mihomo

version: 2

builds:
  - id: main
    env:
      - CGO_ENABLED=0
    flags:
      - -v
      - -trimpath
    ldflags:
      - -X github.com/metacubex/mihomo/constant.Version={{.Version}}
      - -X github.com/metacubex/mihomo/constant.BuildTime={{.Date}}
      - -s
      - -w
      - -buildid=
    tags:
      - with_gvisor
    goos:
      - windows
    goarch:
      - amd64
    goamd64:
      - v3
    main: .
    binary: mihomo

archives:
  - name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}-{{ .Amd64 }}"
    formats:
      - tar.gz
